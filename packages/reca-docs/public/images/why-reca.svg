<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f4ff"/>
    </linearGradient>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <rect width="900" height="400" rx="16" fill="url(#bgGrad)" stroke="#e0e0e0"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="700" fill="#333">Spaghetti Code → Clean Architecture</text>

  <!-- LEFT SIDE: Tangled code -->
  <text x="185" y="70" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#c62828">Tangled Code</text>

  <!-- Tangled blobs -->
  <rect x="40" y="90" width="290" height="260" rx="12" fill="#fff5f5" stroke="#e57373" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- Spaghetti lines connecting everything -->
  <path d="M100,130 C180,160 80,200 170,210 S250,180 140,240 S80,280 200,300 S280,250 160,320" fill="none" stroke="#ef9a9a" stroke-width="2" opacity="0.5"/>
  <path d="M250,120 C170,170 280,200 160,220 S100,260 240,280 S200,310 120,300" fill="none" stroke="#ce93d8" stroke-width="2" opacity="0.5"/>
  <path d="M150,100 C220,180 90,220 230,260 S140,300 260,320" fill="none" stroke="#90caf9" stroke-width="2" opacity="0.5"/>

  <!-- Tangled blocks scattered randomly -->
  <rect x="60" y="105" width="80" height="32" rx="6" fill="#ef5350" opacity="0.85"/>
  <text x="100" y="126" text-anchor="middle" font-family="monospace" font-size="11" fill="white">JSX + CSS</text>

  <rect x="200" y="120" width="100" height="32" rx="6" fill="#ab47bc" opacity="0.85"/>
  <text x="250" y="141" text-anchor="middle" font-family="monospace" font-size="11" fill="white">fetch() + UI</text>

  <rect x="80" y="170" width="90" height="32" rx="6" fill="#42a5f5" opacity="0.85"/>
  <text x="125" y="191" text-anchor="middle" font-family="monospace" font-size="11" fill="white">useState</text>

  <rect x="210" y="180" width="100" height="32" rx="6" fill="#ef5350" opacity="0.85"/>
  <text x="260" y="201" text-anchor="middle" font-family="monospace" font-size="11" fill="white">validation</text>

  <rect x="60" y="235" width="110" height="32" rx="6" fill="#ab47bc" opacity="0.85"/>
  <text x="115" y="256" text-anchor="middle" font-family="monospace" font-size="11" fill="white">onClick={...}</text>

  <rect x="200" y="245" width="110" height="32" rx="6" fill="#42a5f5" opacity="0.85"/>
  <text x="255" y="266" text-anchor="middle" font-family="monospace" font-size="11" fill="white">localStorage</text>

  <rect x="100" y="295" width="120" height="32" rx="6" fill="#ef5350" opacity="0.85"/>
  <text x="160" y="316" text-anchor="middle" font-family="monospace" font-size="11" fill="white">style + logic</text>

  <!-- Arrow in the middle -->
  <line x1="370" y1="220" x2="480" y2="220" stroke="#1976d2" stroke-width="3" marker-end="url(#arrowRight)"/>
  <text x="425" y="210" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="700" fill="#1976d2">ReCA</text>

  <!-- RIGHT SIDE: Clean chain -->
  <text x="680" y="70" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#2e7d32">Clean Architecture</text>

  <rect x="510" y="90" width="350" height="260" rx="12" fill="#f1f8e9" stroke="#81c784" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- Clean chain: vertically aligned boxes -->
  <rect x="580" y="105" width="210" height="40" rx="8" fill="#42a5f5"/>
  <text x="685" y="130" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="white">Component (View)</text>

  <line x1="685" y1="145" x2="685" y2="165" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowRight)"/>

  <rect x="580" y="170" width="210" height="40" rx="8" fill="#7e57c2"/>
  <text x="685" y="195" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="white">Store (State)</text>

  <line x1="685" y1="210" x2="685" y2="230" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowRight)"/>

  <rect x="580" y="235" width="210" height="40" rx="8" fill="#ff7043"/>
  <text x="685" y="260" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="white">Service (Logic)</text>

  <line x1="685" y1="275" x2="685" y2="295" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowRight)"/>

  <rect x="580" y="300" width="210" height="40" rx="8" fill="#26a69a"/>
  <text x="685" y="325" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="white">Repository (Data)</text>

  <!-- Labels on the right -->
  <text x="810" y="128" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#666">JSX, styles</text>
  <text x="810" y="193" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#666">UI state</text>
  <text x="810" y="258" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#666">Business rules</text>
  <text x="810" y="323" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#666">API, DB</text>

  <!-- Bottom caption -->
  <text x="185" y="375" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#999">Everything mixed together</text>
  <text x="685" y="375" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#999">Each layer has a single responsibility</text>
</svg>
